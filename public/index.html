<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema OS - IT2B</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Sistema de Ordem de Serviço</h1>
    <img src="IT2B IMG.png" alt="IT2B">
</header>

<div class="container">
    <div class="card">
        <h2>Nova Ordem de Serviço</h2>

        <form action="/os" method="POST">

            <label>Número do Chamado (opcional)</label>
            <input type="text" name="numero_chamado">

            <label>Nome do Responsável</label>
            <input type="text" name="nome" required>

            <label>Cartório</label>
            <input type="text" name="cartorio" required>

            <label>Equipamento</label>
            <input type="text" name="equipamento" required>

            <label>Número do Patrimônio</label>
            <input type="text" name="patrimonio" required>

            <label>Descrição do Problema</label>
            <textarea name="descricao" required></textarea>

            <label>Data da Retirada</label>
            <input type="date" name="data_retirada" required>

            <label>Técnico Responsável</label>
            <input type="text" name="tecnico" required>

            <br><br>
            <hr>
            <br>

            <label style="font-size:14px;text-transform:none;">Parágrafos adicionais no PDF:</label>

            <br><br>

            <input type="checkbox" name="paragrafo_reparo" value="1" id="reparo">
            <label for="reparo" style="display:inline;text-transform:none;font-weight:normal;font-size:14px;">
                Incluir devolução por reparo
            </label>

            <br><br>

            <input type="checkbox" name="paragrafo_substituicao" value="1" id="substituicao"
                onclick="document.getElementById('campo_patrimonio_novo').style.display = this.checked ? 'block' : 'none'">
            <label for="substituicao" style="display:inline;text-transform:none;font-weight:normal;font-size:14px;">
                Incluir substituição de equipamento
            </label>

            <div id="campo_patrimonio_novo" style="display:none;margin-top:10px;">
                <label>Patrimônio do novo equipamento</label>
                <input type="text" name="patrimonio_novo">
            </div>

            <button type="submit">Criar OS</button>

        </form>
    </div>

    <a href="/lista" class="btn-link">Ver todas as OS</a>
&nbsp;
<a href="/inventario" class="btn-link">Inventário</a>
</div>

</body>
</html>
